<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCTierlists - Coming Soon</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: #0a0a0a;
        color: white;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    /* Background glow */
    .bg-glow {
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, #a47dff33, transparent 70%);
        filter: blur(100px);
        animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-30px); }
    }

    .container {
        text-align: center;
        z-index: 2;
        padding: 20px;
    }

    h1 {
    font-size: 3rem;
    letter-spacing: 2px;
    margin-bottom: 10px;
    color: #ffffff;

    /* Glow effect */
    text-shadow:
        0 0 5px #a47dff,
        0 0 10px #a47dff,
        0 0 20px #a47dff44;

    /* Smooth entrance */
    animation: fadeUp 1s ease forwards;
}

    h1 span {
    color: #a47dff;

    text-shadow:
        0 0 10px #a47dff,
        0 0 20px #a47dff,
        0 0 40px #a47dff88;
}

    p.subtitle {
        color: #aaa;
        margin-bottom: 20px;
    }

    .subtitle {
    color: #aaa;
    margin-bottom: 20px;

    text-shadow: 0 0 8px rgba(164, 125, 255, 0.2);
}   

    .coming {
    font-size: 1.5rem;
    margin-bottom: 30px;
    color: #a47dff;

    text-shadow:
        0 0 8px #a47dff,
        0 0 20px #a47dff55;

    animation: pulseGlow 2s infinite ease-in-out;
}

@keyframes pulseGlow {
    0%, 100% {
        text-shadow:
            0 0 8px #a47dff,
            0 0 20px #a47dff55;
    }
    50% {
        text-shadow:
            0 0 15px #a47dff,
            0 0 35px #a47dff;
    }
}

    /* Countdown */
    .countdown {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 40px;
    }

    .time-box {
        background: rgba(255,255,255,0.05);
        padding: 15px 20px;
        border-radius: 10px;
        backdrop-filter: blur(10px);
    }

    .time-box span {
    display: block;
    font-size: 1.8rem;
    color: #a47dff;

    text-shadow:
        0 0 6px #a47dff,
        0 0 15px #a47dff66;
}

    .time-box small {
        color: #777;
        font-size: 0.8rem;
    }

    @keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

    /* Button */
    .discord-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 25px;
        background: #a47dff;
        color: black;
        text-decoration: none;
        border-radius: 30px;
        font-weight: bold;
        transition: 0.3s;
        box-shadow: 0 0 15px #a47dff55;
    }

    .discord-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 0 25px #a47dff;
    }

    footer {
        position: absolute;
        bottom: 15px;
        font-size: 0.8rem;
        color: #666;
    }

    @media (max-width: 600px) {
        h1 { font-size: 2rem; }
        .countdown { gap: 10px; }
        .time-box { padding: 10px; }
    }
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container">
    <h1><span>MC</span>Tierlists</h1>
    <p class="subtitle">Cross Gamemode Experience</p>

    <div class="coming">Coming Soon</div>

    <div class="countdown">
        <div class="time-box">
            <span id="days">00</span>
            <small>Days</small>
        </div>
        <div class="time-box">
            <span id="hours">00</span>
            <small>Hours</small>
        </div>
        <div class="time-box">
            <span id="minutes">00</span>
            <small>Minutes</small>
        </div>
        <div class="time-box">
            <span id="seconds">00</span>
            <small>Seconds</small>
        </div>
    </div>

    <a href="https://discord.gg/mctierlists" target="_blank" class="discord-btn">
        Revive The Tierlist
    </a>
</div>

<footer>
    © 2026 MCTierlists
</footer>

<script>
    const launchDate = new Date("May 20, 2026 16:00:00").getTime();

    const timer = setInterval(function() {
        const now = new Date().getTime();
        const distance = launchDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((distance / (1000 * 60)) % 60);
        const seconds = Math.floor((distance / 1000) % 60);

        document.getElementById("days").innerText = days;
        document.getElementById("hours").innerText = hours;
        document.getElementById("minutes").innerText = minutes;
        document.getElementById("seconds").innerText = seconds;

        if (distance < 0) {
            clearInterval(timer);
            document.querySelector(".coming").innerText = "We're Live!";
        }
    }, 1000);
</script>

</body>
</html>
